<div class="detail-container">
  <button class="btn-back" (click)="goBack()">← Back to Albums</button>

  <div *ngIf="loading" class="loading">
    <div class="spinner"></div>
    <p>Loading album...</p>
  </div>

  <div *ngIf="!loading && album" class="detail-card">
    <div class="detail-header">
      <span class="album-id">#{{ album.id }}</span>
      <span class="user-badge">User {{ album.userId }}</span>
    </div>

    <h1>{{ album.title }}</h1>

    <div class="edit-section">
      <h2>Edit Title</h2>
      <input
        type="text"
        [(ngModel)]="editTitle"
        class="edit-input"
        placeholder="Album title"
      />
      <button class="btn-save" (click)="saveAlbum()" [disabled]="saving">
        {{ saving ? 'Saving...' : 'Save' }}
      </button>
      <span *ngIf="saved" class="saved-badge">✓ Saved!</span>
    </div>

    <div class="actions">
      <button class="btn-photos" (click)="viewPhotos()">🖼️ View Photos</button>
    </div>
  </div>
</div>
